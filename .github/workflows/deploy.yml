name: Deploy Privileged Identity Monitor

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-production
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Build Frontend ────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ── Embed frontend inside backend/public ──────────────────────
      - name: Copy frontend dist → backend/public
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/. backend/public/

      # ── Install backend prod deps (npm install to pick up new packages) ──
      - name: Install backend deps
        working-directory: backend
        run: npm install --omit=dev

      # ── Deploy backend folder (includes public/) ──────────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: ./backend
