name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: azure-staging
  cancel-in-progress: false

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      staging-url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Build Frontend ─────────────────────────────────────────────
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend dist → backend/public
        run: |
          mkdir -p backend/public
          cp -r frontend/dist/. backend/public/

      # ── Install backend deps ───────────────────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: npm install --omit=dev

      # ── Deploy to STAGING ──────────────────────────────────────────
      - name: Deploy to Azure App Service (Staging)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_STAGING_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_STAGING_PUBLISH_PROFILE }}
          package: ./backend

      - name: Resolve staging URL
        id: get-url
        run: |
          # Prefer explicit secret, fall back to constructing from app name
          if [ -n "${{ secrets.AZURE_STAGING_URL }}" ]; then
            STAGING_URL="${{ secrets.AZURE_STAGING_URL }}"
            echo "Using AZURE_STAGING_URL secret"
          elif [ -n "${{ secrets.AZURE_STAGING_APP_NAME }}" ]; then
            STAGING_URL="https://${{ secrets.AZURE_STAGING_APP_NAME }}.azurewebsites.net"
            echo "⚠️ AZURE_STAGING_URL not set — constructed URL from AZURE_STAGING_APP_NAME"
          else
            echo "❌ Neither AZURE_STAGING_URL nor AZURE_STAGING_APP_NAME is set"
            exit 1
          fi
          echo "url=$STAGING_URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $STAGING_URL"

      # ── Smoke Tests ────────────────────────────────────────────────
      - name: Wait for staging to become healthy
        run: |
          STAGING_URL="${{ steps.get-url.outputs.url }}"
          URL="$STAGING_URL/api/health"
          echo "Polling: $URL"
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /tmp/curl_body -w "%{http_code}" \
              --connect-timeout 10 --max-time 15 "$URL" 2>/tmp/curl_err) || STATUS="000"
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "000" ]; then
              echo "  curl error: $(cat /tmp/curl_err 2>/dev/null || echo 'unknown')"
            fi
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is healthy"
              break
            fi
            if [ "$i" = "36" ]; then
              echo "❌ App did not become healthy after 3 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: Run smoke tests
        run: node backend/tests/smoke.js
        env:
          TEST_URL: ${{ steps.get-url.outputs.url }}
          MOCK_MODE: "true"

      - name: ✅ Staging OK — ready to promote to production
        run: |
          echo "Staging deployment succeeded."
          echo "Run the 'Deploy to Production' workflow or use the /deploy-to-prod skill to promote."
